<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – Yot-Presentation</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📊</text></svg>"/>
  <!-- Chart.js for graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    /* ── layout ── */
    body { overflow: auto; }
    #admin-app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── top-nav ── */
    .admin-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-nav .nav-brand { font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; gap: 8px; }
    .admin-nav .nav-right { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; color: var(--text2); }
    .admin-nav .nav-right a { color: var(--accent); text-decoration: none; }
    .admin-nav .nav-right a:hover { text-decoration: underline; }

    /* ── main content ── */
    .admin-main {
      flex: 1;
      padding: 28px 28px 48px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }
    .admin-main h2 { font-size: 1.1rem; color: var(--text2); margin-bottom: 20px; }

    /* ── stat cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-card .stat-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); }
    .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); line-height: 1.1; }
    .stat-card .stat-icon { font-size: 1.4rem; margin-bottom: 4px; }

    /* ── section titles ── */
    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── charts row ── */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .chart-card canvas { max-height: 240px; }

    /* ── tables ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 8px 12px; color: var(--text2); font-weight: 600;
         font-size: 0.78rem; text-transform: uppercase; letter-spacing: .05em;
         border-bottom: 1px solid var(--border); }
    td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* event type badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-upload        { background: rgba(63,185,80,.18); color: var(--accent2); }
    .badge-delete        { background: rgba(248,81,73,.18); color: var(--danger); }
    .badge-voice_command { background: rgba(88,166,255,.18); color: var(--accent); }
    .badge-admin_login   { background: rgba(210,153,34,.18); color: var(--warn); }
    .badge-admin_register{ background: rgba(210,153,34,.18); color: var(--warn); }
    .badge-default       { background: var(--surface2); color: var(--text2); }

    /* loading state */
    .loading { color: var(--text2); font-size: 0.9rem; text-align: center; padding: 40px 0; }
    .error-banner {
      background: rgba(248,81,73,.15);
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.875rem;
    }

    /* refresh button */
    .btn-refresh {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-refresh:hover { background: var(--border); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-header .section-title { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }
  </style>
</head>
<body>
<div id="admin-app">

  <!-- ── navigation bar ── -->
  <nav class="admin-nav">
    <div class="nav-brand">📊 Admin Dashboard</div>
    <div class="nav-right">
      <span>👤 {{ username }}</span>
      <a href="/admin/logout">Log out</a>
      <a href="/">← Site</a>
    </div>
  </nav>

  <!-- ── main content ── -->
  <main class="admin-main">
    <div id="error-area"></div>

    <!-- stat cards -->
    <div id="stats-loading" class="loading">Loading statistics…</div>
    <div id="stats-area" style="display:none">
      <div class="stats-grid" id="stat-cards"></div>

      <!-- charts row -->
      <div class="charts-row">
        <div class="chart-card">
          <div class="section-title">📈 Uploads – Last 14 Days</div>
          <canvas id="chart-uploads"></canvas>
        </div>
        <div class="chart-card">
          <div class="section-title">🎤 Top Voice Commands</div>
          <canvas id="chart-commands"></canvas>
        </div>
      </div>

      <!-- recent activity -->
      <div class="table-card">
        <div class="section-header">
          <div class="section-title">🕐 Recent Activity</div>
          <button class="btn-refresh" id="btn-refresh">↺ Refresh</button>
        </div>
        <table id="tbl-recent">
          <thead>
            <tr>
              <th>Type</th>
              <th>Detail</th>
              <th>Timestamp (UTC)</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- top commands table -->
      <div class="table-card">
        <div class="section-title">🏆 Voice Command Leaderboard</div>
        <table id="tbl-commands">
          <thead>
            <tr>
              <th>#</th>
              <th>Command</th>
              <th>Uses</th>
              <th>Avg Confidence</th>
              <th>Last Used (UTC)</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
/* ── helpers ── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function badgeClass(type) {
  const map = {
    upload: 'badge-upload',
    delete: 'badge-delete',
    voice_command: 'badge-voice_command',
    admin_login: 'badge-admin_login',
    admin_register: 'badge-admin_register',
  };
  return map[type] || 'badge-default';
}

function fmtTs(ts) {
  try {
    const d = new Date(ts);
    return d.toISOString().replace('T',' ').slice(0,19);
  } catch { return ts; }
}

/* ── chart instances ── */
let uploadsChart = null;
let commandsChart = null;

/* ── chart colours aligned with CSS vars ── */
const accent   = '#58a6ff';
const accent2  = '#3fb950';
const danger   = '#f85149';
const warn     = '#d29922';

function buildUploadsChart(dailyUploads) {
  const labels = dailyUploads.map(r => r.day);
  const data   = dailyUploads.map(r => r.count);
  const ctx    = document.getElementById('chart-uploads').getContext('2d');
  if (uploadsChart) uploadsChart.destroy();
  uploadsChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Uploads',
        data,
        backgroundColor: accent + '88',
        borderColor: accent,
        borderWidth: 1,
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8b949e', font: { size: 11 } }, grid: { color: '#30363d' } },
        y: { ticks: { color: '#8b949e', stepSize: 1 }, grid: { color: '#30363d' }, beginAtZero: true },
      },
    },
  });
}

function buildCommandsChart(topCommands) {
  const labels = topCommands.map(r => r.command);
  const data   = topCommands.map(r => r.count);
  const colors = [accent, accent2, warn, danger,
                  '#a371f7','#79c0ff','#56d364','#ffa657','#ff7b72','#ffa198'];
  const ctx = document.getElementById('chart-commands').getContext('2d');
  if (commandsChart) commandsChart.destroy();
  commandsChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors.slice(0, data.length).map(c => c + 'cc'),
        borderColor: colors.slice(0, data.length),
        borderWidth: 1,
      }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'right', labels: { color: '#e6edf3', font: { size: 11 }, boxWidth: 14 } },
      },
    },
  });
}

/* ── render helpers ── */
function renderStatCards(totals) {
  const defs = [
    { icon: '📤', label: 'Total Uploads',       key: 'uploads',          color: accent2 },
    { icon: '🗑️', label: 'Files Deleted',       key: 'deletes',          color: danger  },
    { icon: '🎤', label: 'Voice Commands Used', key: 'voice_commands',   color: accent  },
    { icon: '📁', label: 'Files in Library',    key: 'files_in_library', color: warn    },
  ];
  document.getElementById('stat-cards').innerHTML = defs.map(d => `
    <div class="stat-card">
      <div class="stat-icon">${d.icon}</div>
      <div class="stat-value" style="color:${esc(d.color)}">${esc(totals[d.key] ?? 0)}</div>
      <div class="stat-label">${esc(d.label)}</div>
    </div>
  `).join('');
}

function renderRecentTable(events) {
  const tbody = document.querySelector('#tbl-recent tbody');
  if (!events.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text2)">No events yet</td></tr>';
    return;
  }
  tbody.innerHTML = events.map(e => `
    <tr>
      <td><span class="badge ${esc(badgeClass(e.event_type))}">${esc(e.event_type)}</span></td>
      <td>${esc(e.detail || '—')}</td>
      <td style="color:var(--text2);font-size:.82rem">${esc(fmtTs(e.ts))}</td>
    </tr>
  `).join('');
}

function renderCommandsTable(commands) {
  const tbody = document.querySelector('#tbl-commands tbody');
  if (!commands.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text2)">No commands recorded yet</td></tr>';
    return;
  }
  tbody.innerHTML = commands.map((c, i) => `
    <tr>
      <td style="color:var(--text2)">${i + 1}</td>
      <td><code style="color:var(--accent)">${esc(c.command)}</code></td>
      <td>${esc(c.count)}</td>
      <td>${esc((c.avg_confidence * 100).toFixed(1))}%</td>
      <td style="color:var(--text2);font-size:.82rem">${esc(fmtTs(c.last_used))}</td>
    </tr>
  `).join('');
}

/* ── load stats ── */
async function loadStats() {
  document.getElementById('stats-loading').style.display = '';
  document.getElementById('stats-area').style.display   = 'none';
  document.getElementById('error-area').innerHTML = '';
  try {
    const res  = await fetch('/admin/api/stats');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    renderStatCards(data.totals);
    buildUploadsChart(data.daily_uploads || []);
    buildCommandsChart(data.top_commands || []);
    renderRecentTable(data.recent_events || []);
    renderCommandsTable(data.top_commands || []);

    document.getElementById('stats-loading').style.display = 'none';
    document.getElementById('stats-area').style.display   = '';
  } catch (err) {
    document.getElementById('stats-loading').style.display = 'none';
    document.getElementById('error-area').innerHTML =
      `<div class="error-banner">Failed to load statistics: ${esc(err.message)}</div>`;
    document.getElementById('stats-area').style.display = '';
  }
}

document.getElementById('btn-refresh').addEventListener('click', loadStats);

/* ── initial load ── */
loadStats();
</script>
</body>
</html>
